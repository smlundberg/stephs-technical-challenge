{% load static %}
<html>
  <head>
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter" />
  </head>

  <body class="container_success">
    <div class="logged_in_nav">
      <div class="flex">
        <div>
          <img src="{% static 'images/workos-logo-with-text.png' %}" alt="workos logo" />
        </div>
      </div>
      <div class="flex">
        <a href="https://workos.com/docs" target="_blank"
          ><button class="button nav-item">Documentation</button></a
        >
        <a href="https://workos.com/docs/reference" target="_blank"
          ><button class="button nav-item">API Reference</button></a
        >
        <a href="https://workos.com/blog" target="_blank"
          ><button class="button nav-item blog-nav-button">Blog</button></a
        >
        <a href="https://workos.com/" target="_blank"
          ><button class="button button-outline">WorkOS</button></a
        >
      </div>
    </div>

    <div class="flex">
      <div class="logged_in_div_right">
        <div class="flex_column">
          <div class="flex width-941px space-between">
            <div>
              <p>Welcome, {{first_name}} {{last_name}}!</p>
              <p>Directory Users</p>
            </div>
            <div class="flex" style="gap: 10px;">
              <a href="javascript:history.back()"
                ><button class="button button-outline">Back</button></a
              >
              <a href="/logout"
                ><button class="button button-outline">Log Out</button></a
              >
            </div>
          </div>

          {% if users.data %}
          <table class="width-941px">
            <thead>
              <tr>
                <th style="text-align: left; padding: 8px;">Name</th>
                <th style="text-align: left; padding: 8px;">Email</th>
                <th style="text-align: left; padding: 8px;">State</th>
              </tr>
            </thead>
            <tbody>
              {% for user in users.data %}
              <tr>
                <td style="padding: 8px;">{{ user.first_name }} {{ user.last_name }}</td>
                <td style="padding: 8px;"><code>{{ user.username }}</code></td>
                <td style="padding: 8px;">{{ user.state }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
          {% else %}
          <div class="card" style="padding: 16px;">
            <code>No users found in this directory.</code>
          </div>
          {% endif %}
        </div>
      </div>
    </div>
  </body>
</html>
